# Navigation configuration for Strands Agents SDK documentation
# This file combines navbar, sidebar, and GitHub dropdown configuration.
#
# STRUCTURE:
# - navbar: Top navigation bar links
# - sidebar: Hierarchical sidebar structure (slugs only for files - labels from frontmatter)
# - github: GitHub dropdown sections
#
# NOTE: Badges (like "new", "community") should come from page frontmatter only,
# not from this configuration file.

navbar:
  - label: Home
    href: /
  - label: Docs
    href: /docs/user-guide/quickstart/typescript/
    basePath: /docs/user-guide/
  - label: Examples
    href: /docs/examples/
    basePath: /docs/examples/
  - label: Community
    href: /docs/community/community-packages/
    basePath:
      - /docs/community/
      - /docs/labs/
      - /docs/contribute/
  - label: API Reference
    href: /docs/api/typescript/
    basePath: /docs/api/
  - label: Blog
    href: /blog/
    basePath: /blog/
    align: right
  - label: Labs
    href: https://github.com/strands-labs
    external: true
    align: right

