name: Python Check

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string

jobs:
  py-check:
    name: strandly check --py
    permissions:
      contents: read
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install wasm-tools
        run: brew install wasm-tools

      - name: Bootstrap strandly + venv
        run: |
          npm ci
          echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"
          python -m venv .venv
          .venv/bin/pip install -e .

      - name: Build strands-wasm
        run: strandly build --wasm

      - name: Install strands-py-wasm
        run: .venv/bin/pip install -e strands-py-wasm

      - name: strandly check --py
        run: strandly check --py
